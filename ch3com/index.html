<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조합론 문제은행 — 경우의 수 · 곱의 법칙 · 순열</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#FAF6EF; --ink:#22252B; --sub:#565B66;
  --card:#FFFFFF; --line:#E4DCCB;
  --count:#2A6E8F; --mult:#B0641E; --perm1:#3D5AA8; --perm2:#8A2A6B;
  --ok:#1E7A46; --okbg:#E6F4EA; --no:#C0392B; --nobg:#FBEAE7;
  --hintbg:#FFF7DF; --hintbd:#E8C95A;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:19px}
body{background:var(--ivory);color:var(--ink);font-family:'Noto Sans KR',sans-serif;line-height:1.65;padding-bottom:80px}
.mono{font-family:'JetBrains Mono','Noto Sans KR',monospace}

header{padding:34px 20px 10px;text-align:center}
header .eyebrow{font-family:'JetBrains Mono',monospace;font-size:.85rem;letter-spacing:.25em;color:var(--sub);font-weight:700}
header h1{font-size:2rem;font-weight:900;margin-top:8px}
header h1 .dice{display:inline-block;transform:rotate(-8deg)}
header p{color:var(--sub);font-size:1rem;margin-top:6px}

nav{position:sticky;top:0;z-index:50;background:rgba(250,246,239,.95);backdrop-filter:blur(6px);
  border-bottom:3px solid var(--ink);padding:12px 10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
nav button{font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:700;padding:10px 16px;border-radius:999px;
  border:2.5px solid var(--ink);background:#fff;color:var(--ink);cursor:pointer;transition:transform .12s}
nav button:hover{transform:translateY(-2px)}
nav button:focus-visible{outline:3px solid var(--perm1);outline-offset:2px}
nav button.active{background:var(--ink);color:#fff}
nav button .mini{font-family:'JetBrains Mono',monospace;font-size:.8rem;margin-left:6px;opacity:.85}

main{max-width:880px;margin:0 auto;padding:26px 18px}
.page{display:none}
.page.show{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- 홈 ---------- */
.hero{background:var(--card);border:3px solid var(--ink);border-radius:22px;padding:30px 26px;box-shadow:8px 8px 0 var(--line)}
.hero h2{font-size:1.5rem;font-weight:900;margin-bottom:10px}
.hero p{font-size:1.05rem;color:var(--sub)}
.concepts{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-top:22px}
.concept{border:3px solid;border-radius:16px;padding:18px;background:#fff;cursor:pointer;transition:transform .12s;text-align:left;font-family:inherit}
.concept:hover{transform:translateY(-3px)}
.concept:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
.concept h3{font-size:1.15rem;font-weight:900;display:flex;align-items:center;gap:8px}
.concept .num{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:#fff;border-radius:8px;padding:2px 9px}
.concept p{font-size:.95rem;color:var(--sub);margin-top:8px}
.concept .ex{font-family:'JetBrains Mono','Noto Sans KR',monospace;font-size:.9rem;margin-top:10px;padding:8px 10px;border-radius:10px;background:var(--ivory);font-weight:700}

/* ---------- 문제 페이지 ---------- */
.sec-head{border:3px solid var(--ink);border-radius:18px;padding:20px 22px;background:#fff;box-shadow:6px 6px 0 var(--line);margin-bottom:22px}
.sec-head h2{font-size:1.45rem;font-weight:900}
.sec-head p{color:var(--sub);font-size:1rem;margin-top:6px}
.progress-wrap{margin-top:14px;display:flex;align-items:center;gap:12px}
.pbar{flex:1;height:16px;border:2.5px solid var(--ink);border-radius:999px;background:#fff;overflow:hidden}
.pbar>div{height:100%;width:0%;transition:width .3s ease;border-radius:999px}
.pcount{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem}

.prob{background:var(--card);border:3px solid var(--line);border-left:10px solid var(--ink);border-radius:16px;padding:20px 22px;margin-bottom:18px}
.prob.done-ok{border-color:var(--ok);border-left-color:var(--ok);background:linear-gradient(0deg,var(--okbg),var(--okbg))}
.prob.done-rev{border-left-color:var(--sub)}
.prob-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.qnum{font-family:'JetBrains Mono',monospace;font-weight:700;color:#fff;border-radius:10px;padding:3px 12px;font-size:1rem}
.tag{font-size:.85rem;font-weight:700;border-radius:999px;padding:2px 12px;display:none}
.tag.ok{display:inline-block;background:var(--ok);color:#fff}
.tag.rev{display:inline-block;background:var(--sub);color:#fff}
.qtext{font-size:1.15rem;font-weight:500;margin-top:10px}
.answer-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}
.answer-row input{font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:700;width:150px;padding:10px 14px;
  border:3px solid var(--ink);border-radius:12px;background:#fff;color:var(--ink)}
.answer-row input:focus-visible{outline:3px solid var(--perm1);outline-offset:2px}
.answer-row .unit{font-size:1.05rem;font-weight:700;color:var(--sub)}
.btn{font-family:'Noto Sans KR',sans-serif;font-size:1.02rem;font-weight:700;padding:10px 20px;border-radius:12px;
  border:3px solid var(--ink);cursor:pointer;transition:transform .1s}
.btn:hover{transform:translateY(-2px)}
.btn:focus-visible{outline:3px solid var(--perm1);outline-offset:2px}
.btn.check{background:var(--ink);color:#fff}
.btn.ghost{background:#fff;color:var(--ink)}
.btn:disabled{opacity:.45;cursor:default;transform:none}
.feedback{display:none;margin-top:14px;border-radius:12px;padding:12px 16px;font-size:1.02rem;font-weight:700;border:3px solid}
.feedback.ok{display:block;background:var(--okbg);border-color:var(--ok);color:var(--ok)}
.feedback.no{display:block;background:var(--nobg);border-color:var(--no);color:var(--no)}
.hintbox{display:none;margin-top:12px;background:var(--hintbg);border:3px dashed var(--hintbd);border-radius:12px;padding:12px 16px;font-size:1rem}
.hintbox.show{display:block}
.expbox{display:none;margin-top:12px;background:var(--ivory);border:3px solid var(--line);border-radius:12px;padding:14px 16px;font-size:1.02rem}
.expbox.show{display:block}
.expbox b{font-weight:900}

/* ---------- 결과 ---------- */
.result-card{background:#fff;border:3px solid var(--ink);border-radius:22px;padding:30px 26px;box-shadow:8px 8px 0 var(--line);text-align:center}
.result-card h2{font-size:1.5rem;font-weight:900}
.total-score{font-family:'JetBrains Mono',monospace;font-size:3.2rem;font-weight:700;margin:14px 0 4px}
.total-score span{font-size:1.4rem;color:var(--sub)}
.result-msg{font-size:1.15rem;font-weight:700;margin-bottom:20px}
.sec-scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:8px}
.sec-score{border:3px solid;border-radius:14px;padding:14px}
.sec-score h4{font-size:1rem;font-weight:900}
.sec-score .s{font-family:'JetBrains Mono',monospace;font-size:1.7rem;font-weight:700;margin-top:4px}
.reset-row{margin-top:24px}
footer{margin-top:36px;text-align:center;color:var(--sub);font-size:.9rem}
@media (max-width:560px){
  html{font-size:17px}
  header h1{font-size:1.55rem}
  .qtext{font-size:1.1rem}
}
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<header>
  <div class="eyebrow">SEYOUNG CODING LAB · 사고력수학</div>
  <h1><span class="dice">🎲</span> 조합론 문제은행</h1>
  <p>경우의 수 · 곱의 법칙 · 순열 기본 · 순열 심화 — 총 40문제</p>
</header>

<nav id="nav"></nav>

<main>
  <!-- 홈 -->
  <section class="page" id="pg0">
    <div class="hero">
      <h2>차근차근 세는 힘을 길러요!</h2>
      <p>문제를 읽고 답을 숫자로 입력한 뒤 <b>확인</b> 버튼을 누르세요. 틀리면 힌트가 나오고, 맞히면 풀이를 볼 수 있어요. 모든 문제를 풀면 <b>결과</b> 탭에서 점수를 확인할 수 있습니다.</p>
      <div class="concepts" id="conceptGrid"></div>
    </div>
  </section>

  <!-- 문제 페이지 4개: pg1~pg4 (JS에서 생성) -->
  <section class="page" id="pg1"></section>
  <section class="page" id="pg2"></section>
  <section class="page" id="pg3"></section>
  <section class="page" id="pg4"></section>

  <!-- 결과 -->
  <section class="page" id="pg5">
    <div class="result-card">
      <h2>🏅 나의 결과</h2>
      <div class="total-score"><span id="totalNum">0</span><span> / 40</span></div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="sec-scores" id="secScores"></div>
      <div class="reset-row"><button class="btn ghost" id="resetBtn">처음부터 다시 풀기</button></div>
    </div>
  </section>
</main>

<footer>한 문제씩 손으로 그려 가며 세어 보는 것이 조합론 공부의 지름길이에요 ✏️</footer>

ub2c8\ub2e4."}, {"q": "\uc8fc\uc0ac\uc704 \ud55c \uac1c\ub97c \ub358\uc838\uc11c 3\uc758 \ubc30\uc218\uc758 \ub208\uc774 \ub098\uc624\ub294 \uacbd\uc6b0\uc758 \uc218\ub294 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 2, "hint": "1~6 \uc911\uc5d0\uc11c 3\uc758 \ubc30\uc218\ub97c \ucc3e\uc544 \ubcf4\uc138\uc694.", "exp": "3\uc758 \ubc30\uc218\uc758 \ub208\uc740 3, 6 \u2192 2\uac00\uc9c0\uc785\ub2c8\ub2e4."}, {"q": "1\ubd80\ud130 20\uae4c\uc9c0\uc758 \uc218\uac00 \uc801\ud78c \uce74\ub4dc \uc911\uc5d0\uc11c 5\uc758 \ubc30\uc218 \uce74\ub4dc \ud55c \uc7a5\uc744 \ubf51\ub294 \uacbd\uc6b0\uc758 \uc218\ub294 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 4, "hint": "20\uae4c\uc9c0\uc758 5\uc758 \ubc30\uc218\ub97c \uc21c\uc11c\ub300\ub85c \uc801\uc5b4 \ubcf4\uc138\uc694.", "exp": "5\uc758 \ubc30\uc218\ub294 5, 10, 15, 20 \u2192 4\uac00\uc9c0\uc785\ub2c8\ub2e4."}, {"q": "\uacfc\uc77c \uac00\uac8c\uc5d0 \uc0ac\uacfc\uac00 3\uc885\ub958, \ubc30\uac00 2\uc885\ub958 \uc788\uc2b5\ub2c8\ub2e4. \uc774 \uc911\uc5d0\uc11c \uacfc\uc77c \ud55c \uac1c\ub97c \uace0\ub974\ub294 \uacbd\uc6b0\uc758 \uc218\ub294 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 5, "hint": "\uc0ac\uacfc\ub97c \uace0\ub974\uac70\ub098 '\ub610\ub294' \ubc30\ub97c \uace0\ub974\ub294 \uac70\uc608\uc694. \ud569\uc758 \ubc95\uce59!", "exp": "\uc0ac\uacfc 3\uac00\uc9c0 + \ubc30 2\uac00\uc9c0 = 5\uac00\uc9c0. \ub3d9\uc2dc\uc5d0 \uace0\ub97c \uc218 \uc5c6\uc73c\ubbc0\ub85c \ub354\ud569\ub2c8\ub2e4(\ud569\uc758 \ubc95\uce59)."}, {"q": "\uc9d1\uc5d0\uc11c \ud559\uad50\uae4c\uc9c0 \uac00\ub294 \ubc84\uc2a4 \ub178\uc120\uc774 3\uac1c, \uc9c0\ud558\ucca0 \ub178\uc120\uc774 2\uac1c \uc788\uc2b5\ub2c8\ub2e4. \ubc84\uc2a4 \ub610\ub294 \uc9c0\ud558\ucca0 \uc911 \ud55c \uac00\uc9c0\ub97c \ud0c0\uace0 \ud559\uad50\uc5d0 \uac00\ub294 \ubc29\ubc95\uc740 \ubaa8\ub450 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 5, "hint": "\ubc84\uc2a4\uc640 \uc9c0\ud558\ucca0\uc744 \ub3d9\uc2dc\uc5d0 \ud0c8 \uc218\ub294 \uc5c6\uc5b4\uc694.", "exp": " 4 \ubc14\uc9c0 2\uac00\uc9c0\uc529 \uc9dd\uc9c0\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4."}, {"q": "\uc11c\ub85c \ub2e4\ub978 \ub3d9\uc804 \ub450 \uac1c\ub97c \ub3d9\uc2dc\uc5d0 \ub358\uc9c8 \ub54c, \ub098\uc62c \uc218 \uc788\ub294 \ubaa8\ub4e0 \uacbd\uc6b0\uc758 \uc218\ub294 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 4, "hint": "\uccab \ubc88\uc9f8 \ub3d9\uc804 2\uac00\uc9c0 \u00d7 \ub450 \ubc88\uc9f8 \ub3d9\uc804 2\uac00\uc9c0", "exp": "2 \u00d7 2 = 4\uac00\uc9c0. (\uc55e,\uc55e), (\uc55e,\ub4a4), (\ub4a4,\uc55e), (\ub4a4,\ub4a4)"}, {"q": "\uc9d1\uc5d0\uc11c \ud559\uad50\uae4c\uc9c0 \uac00\ub294 \uae38\uc774 2\uac00\uc9c0, \ud559\uad50\uc5d0\uc11c \ub3c4\uc11c\uad00\uae4c\uc9c0 \uac00\ub294 \uae38\uc774 3\uac00\uc9c0 \uc788\uc2b5\ub2c8\ub2e4. \uc9d1\uc5d0\uc11c \ud559\uad50\ub97c \uac70\uccd0 \ub3c4\uc11c\uad00\uae4c\uc9c0 \uac00\ub294 \ubc29\ubc95\uc740 \ubaa8\ub450 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 6, "hint": "\ud559\uad50\uae4c\uc9c0 \uac04 '\ub2e4\uc74c\uc5d0' \ub3c4\uc11c\uad00\uc73c\ub85c \uac00\uc694. \uc5f0\ub2ec\uc544 \uc77c\uc5b4\ub098\uba74 \uacf1\ud558\uae30!", "exp": "2 \u00d7 3 = 6\uac00\uc9c0. \ud559\uad50\uae4c\uc9c0 \uac00\ub294 \uac01 \uae38\ub9c8\ub2e4 \ub3c4\uc11c\uad00 \uac00\ub294 \uae38\uc774 3\uac00\uc9c0\uc529 \uc788\uc2b5\ub2c8\ub2e4."}, {"q": "\uc11c\ub85c \ub2e4\ub978 \ub450 \uac1c\uc758 \uc8fc\uc0ac\uc704\ub97c \ub3d9\uc2dc\uc5d0 \ub358\uc9c8 \ub54c, \ub098\uc62c \uc218 \uc788\ub294 \ubaa8\ub4e0 \uacbd\uc6b0\uc758 \uc218\ub294 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 36, "hint": "\uccab \ubc88\uc9f8 \uc8fc\uc0ac\uc704 6\uac00\uc9c0 \u00d7 \ub450 \ubc88\uc9f8 \uc8fc\uc0ac\uc704 6\uac00\uc9c0", "exp": "6 \u00d7 6 = 36\uac00\uc9c0\uc785\ub2c8\ub2e4."}, {"q": "\uc544\uc774\uc2a4\ud06c\ub9bc \uac00\uac8c\uc5d0 \ub9db\uc774 5\uac00\uc9c0, \ucf58 \uc885\ub958\uac00 2\uac00\uc9c0 \uc788\uc2b5\ub2c8\ub2e4. \ub9db \ud558\ub098\uc640 \ucf58 \ud558\ub098\ub97c \uace8\ub77c \uc8fc\ubb38\ud558\ub294 \ubc29\ubc95\uc740 \ubaa8\ub450 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 10, "hint": "\ub9db\uc744 \uace0\ub974\uace0 '\uadf8\ub9ac\uace0' \ucf58\uc744 \uace8\ub77c\uc694.", "exp": "5 \u00d7 2 = 10\uac00\uc9c0\uc785\ub2c8\ub2e4."}, {"q": "\ub3d9\uc804 \ud55c \uac1c\uc640 \uc8fc\uc0ac\uc704 \ud55c \uac1c\ub97c \ub3d9\uc2dc\uc5d0 \ub358\uc9c8 \ub54c, \ub098\uc62c \uc218 \uc788\ub294 \ubaa8\ub4e0 \uacbd\uc6b0\uc758 \uc218\ub294 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 12, "hint": "\ub3d9\uc804 2\uac00\uc9c0 \u00d7 \uc8fc\uc0ac\uc704 6\uac00\uc9c0", "exp": "2 \u00d7 6 = 12\uac00\uc9c0\uc785\ub2c8\ub2e4."}, {"q": "\uc22b\uc790 1, 2, 3\uc744 \uc0ac\uc6a9\ud558\uc5ec \ub450 \uc790\ub9ac \uc218\ub97c \ub9cc\ub4e4\ub824\uace0 \ud569\ub2c8\ub2e4. \uac19\uc740 \uc22b\uc790\ub97c \ub450 \ubc88 \uc0ac\uc6a9\ud574\ub3c4 \ub41c\ub2e4\uba74, \ub9cc\ub4e4 \uc218 \uc788\ub294 \ub450 \uc790\ub9ac \uc218\ub294 \ubaa8\ub450 \uba87 \uac1c\uc77c\uae4c\uc694?", "a": 9, "hint": "\uc2ed\uc758 \uc790\ub9ac 3\uac00\uc9c0, \uc77c\uc758 \uc790\ub9ac\ub3c4 3\uac00\uc9c0 (\uc911\ubcf5 OK!)", "exp": "3 \u00d7 3 = 9\uac1c. 11, 12, 13, 21, 22, 23, 31, 32, 33"}, {"q": "\ubaa8\uc790 2\uac1c, \ud2f0\uc154\uce20 3\ubc8c, \ubc14\uc9c0 2\ubc8c\uc774 \uc788\uc2b5\ub2c8\ub2e4. \ubaa8\uc790, \ud2f0\uc154\uce20, \ubc14\uc9c0\ub97c \ud558\ub098\uc529 \uace8\ub77c \uc785\ub294 \ubc29\ubc95\uc740 \ubaa8\ub450 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 12, "hint": "\uc138 \uac00\uc9c0\ub97c \uc5f0\ub2ec\uc544 \uace0\ub974\ub2c8 \uc138 \uc218\ub97c \ubaa8\ub450 \uacf1\ud574\uc694.", "exp": "2 \u00d7 3 \u00d7 2 = 12\uac00\uc9c0\uc785\ub2c8\ub2e4."}, {"q": "4\uac1c\uc758 \ubcf4\uae30 \uc911 \ud558\ub098\ub97c \uace0\ub974\ub294 \uac1d\uad00\uc2dd \ubb38\uc81c\uac00 3\ubb38\uc81c \uc788\uc2b5\ub2c8\ub2e4. \uc138 \ubb38\uc81c\uc758 \ub2f5\uc744 \ubaa8\ub450 \ucc0d\ub294 \ubc29\ubc95\uc740 \ubaa8\ub450 \uba87 \uac00\uc9c0\uc77c\uae4c\uc694?", "a": 64, "hint": "\ubb38\uc81c\ub9c8\ub2e4 4\uac00\uc9c0\uc529, 3\ubb38\uc81c \uc5f0\ub2ec\uc544!"   var page = document.getElementById("pg"+(si+1));

  var head = document.createElement("div");
  head.className = "sec-head";
  var h2 = document.createElement("h2");
  h2.textContent = sec.title;
  h2.style.color = sec.color;
  var pd = document.createElement("p");
  pd.textContent = sec.desc;
  var pw = document.createElement("div");
  pw.className = "progress-wrap";
  var pbar = document.createElement("div");
  pbar.className = "pbar";
  var fill = document.createElement("div");
  fill.style.background = sec.color;
  fill.id = "fill"+si;
  pbar.appendChild(fill);
  var pc = document.createElement("div");
  pc.className = "pcount";
  pc.id = "pcount"+si;
  pc.textContent = "0 / "+sec.problems.length;
  pw.appendChild(pbar); pw.appendChild(pc);
  head.appendChild(h2); head.appendChild(pd); head.appendChild(pw);
  page.appendChild(head);

  for(var pi=0; pi<sec.problems.length; pi++){
    page.appendChild(buildProblem(si, pi));
  }
}

function buildProblem(si, pi){
  var sec = DATA[si];
  var prob = sec.problems[pi];

  var card = document.createElement("div");
  card.className = "prob";
  card.style.borderLeftColor = sec.color;
  card.id = "prob-"+si+"-"+pi;

  var top = document.createElement("div");
  top.className = "prob-top";
  var qn = document.createElement("span");
  qn.className = "qnum";
  qn.style.background = sec.color;
  qn.textContent = "Q"+(pi+1);
  var tagOk = document.createElement("span");
  tagOk.className = "tag";
  tagOk.id = "tagok-"+si+"-"+pi;
  tagOk.textContent = MSG.solvedTag;
  var tagRev = document.createElement("span");
  tagRev.className = "tag";
  tagRev.id = "tagrev-"+si+"-"+pi;
  tagRev.textContent = MSG.revealTag;
  top.appendChild(qn); top.appendChild(tagOk); top.appendChild(tagRev);

  var q = document.createElement("div");
  q.className = "qtext";
  q.textContent = prob.q;

  var row = document.createElement("div");
  row.className = "answer-row";
  var input = document.createElement("input");
  input.type = "number";
  input.inputMode = "numeric";
  input.id = "in-"+si+"-"+pi;
  input.setAttribute("aria-label", sec.title+" Q"+(pi+1));
  var unit = document.createElement("span");
  unit.className = "unit";
  unit.textContent = "\uAC00\uC9C0";
  var checkBtn = document.createElement("button");
  checkBtn.className = "btn check";
  checkBtn.textContent = MSG.check;
  checkBtn.id = "chk-"+si+"-"+pi;
  var revBtn = document.createElement("button");
  revBtn.className = "btn ghost";
  revBtn.textContent = MSG.showAnswer;
  revBtn.id = "rev-"+si+"-"+pi;
  row.appendChild(input); row.appendChild(unit); row.appendChild(checkBtn); row.appendChild(revBtn);

  var fb = document.createElement("div");
  fb.className = "feedback";
  fb.id = "fb-"+si+"-"+pi;

  var hint = document.createElement("div");
  hint.className = "hintbox";
  hint.id = "hint-"+si+"-"+pi;
  var hb = document.createElement("b");
  hb.textContent = MSG.hintLabel+" ";
  hint.appendChild(hb);
  hint.appendChild(document.createTextNode(prob.hint));

  var exp = document.createElement("div");
  exp.className = "expbox";
  exp.id = "exp-"+si+"-"+pi;
  var eb = document.createElement("b");
  eb.textContent = MSG.expLabel+" ";
  exp.appendChild(eb);
  exp.appendChild(document.createTextNode(prob.exp));

  checkBtn.addEventListener("click", function(){ checkAnswer(si, pi); });
  input.addEventListener("keydown", function(e){ if(e.key==="Enter") checkAnswer(si, pi); });
  revBtn.addEventListener("click", function(){ revealAnswer(si, pi); });

  card.appendChild(top); card.appendChild(q); card.appendChild(row);
  card.appendChild(fb); card.appendChild(hint); card.appendChild(exp);
  return card;
}

function checkAnswer(si, pi){
  var st = state[si][pi];
  if(st.status !== "none") return;
  var input = document.getElementById("in-"+si+"-"+pi);
  var fb = document.getElementById("fb-"+si+"-"+pi);
  var val = input.value.trim();
  if(val === ""){
    fb.className = "feedback no";
    fb.textContent = MSG.empty;
    return;
  }
  var num = Number(val);
  var ans = DATA[si].problems[pi].a;
  if(num === ans){
    st.status = "ok";
    fb.className = "feedback ok";
    fb.textContent = MSG.correct;
    document.getElementById("exp-"+si+"-"+pi).classList.add("show");
    document.getElementById("hint-"+si+"-"+pi).classList.remove("show");
    document.getElementById("tagok-"+si+"-"+pi).classList.add("ok");
    lockProblem(si, pi, "done-ok");
  } else {
    st.tried = true;
    fb.className = "feedback no";
    fb.textContent = MSG.wrong;
    document.getElementById("hint-"+si+"-"+pi).classList.add("show");
  }
  updateProgress(si);
}

function revealAnswer(si, pi){
  var st = state[si][pi];
  if(st.status !== "none") return;
  st.status = "rev";
  var fb = document.getElementById("fb-"+si+"-"+pi);
  fb.className = "feedback no";
  fb.textContent = MSG.revealed+" \u2014 "+MSG.answerIs+DATA[si].problems[pi].a;
  document.getElementById("exp-"+si+"-"+pi).classList.add("show");
  document.getElementById("tagrev-"+si+"-"+pi).classList.add("rev");
  lockProblem(si, pi, "done-rev");
  updateProgress(si);
}

function lockProblem(si, pi, cls){
  var card = document.getElementById("prob-"+si+"-"+pi);
  card.classList.add(cls);
  document.getElementById("in-"+si+"-"+pi).disabled = true;
  document.getElementById("chk-"+si+"-"+pi).disabled = true;
  document.getElementById("rev-"+si+"-"+pi).disabled = true;
}

function sectionScore(si){
  var ok = 0, done = 0;
  for(var i=0;i<state[si].length;i++){
    if(state[si][i].status==="ok") ok++;
    if(state[si][i].status!=="none") done++;
  }
  return {ok:ok, done:done, total:state[si].length};
}

function updateProgress(si){
  var s = sectionScore(si);
  var fill = document.getElementById("fill"+si);
  var pc = document.getElementById("pcount"+si);
  fill.style.width = (s.done/s.total*100)+"%";
  pc.textContent = s.done+" / "+s.total;
  var mini = document.getElementById("navmini"+(si+1));
  if(mini) mini.textContent = s.ok+"/"+s.total;
}

function renderResults(){
  var total = 0;
  var wrap = document.getElementById("secScores");
  while(wrap.firstChild) wrap.removeChild(wrap.firstChild);
  for(var si=0; si<DATA.length; si++){
    var s = sectionScore(si);
    total += s.ok;
    var box = document.createElement("div");
    box.className = "sec-score";
    box.style.borderColor = DATA[si].color;
    var h4 = document.createElement("h4");
    h4.textContent = DATA[si].badge;
    h4.style.color = DATA[si].color;
    var sc = document.createElement("div");
    sc.className = "s";
    sc.textContent = s.ok+" / "+s.total;
    box.appendChild(h4); box.appendChild(sc);
    wrap.appendChild(box);
  }
  document.getElementById("totalNum").textContent = String(total);
  var msg = document.getElementById("resultMsg");
  if(total===40) msg.textContent = MSG.perfect;
  else if(total>=30) msg.textContent = MSG.great;
  else if(total>=20) msg.textContent = MSG.good;
  else msg.textContent = MSG.tryAgain;
}

document.getElementById("resetBtn").addEventListener("click", function(){
  for(var si=0; si<state.length; si++){
    for(var pi=0; pi<state[si].length; pi++){
      state[si][pi] = {status:"none", tried:false};
      var card = document.getElementById("prob-"+si+"-"+pi);
      card.classList.remove("done-ok","done-rev");
      var input = document.getElementById("in-"+si+"-"+pi);
      input.disabled = false; input.value = "";
      document.getElementById("chk-"+si+"-"+pi).disabled = false;
      document.getElementById("rev-"+si+"-"+pi).disabled = false;
      var fb = document.getElementById("fb-"+si+"-"+pi);
      fb.className = "feedback"; fb.textContent = "";
      document.getElementById("hint-"+si+"-"+pi).classList.remove("show");
      document.getElementById("exp-"+si+"-"+pi).classList.remove("show");
      document.getElementById("tagok-"+si+"-"+pi).classList.remove("ok");
      document.getElementById("tagrev-"+si+"-"+pi).classList.remove("rev");
    }
    updateProgress(si);
  }
  goPage(0);
});

makeNav();
makeConceptCards();
for(var i=0;i<DATA.length;i++) buildSection(i);
goPage(0);
</script>
</body>
</html>
