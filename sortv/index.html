<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정렬 알고리즘 비교 시각화 (Sorting Algorithm Comparison)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: #161b22;
            padding: 15px 25px;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header span {
            font-size: 0.9rem;
            color: #8b949e;
            font-weight: normal;
        }
        .container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
            padding: 10px;
            background-color: #0d1117;
            overflow: hidden;
        }
        .frame-wrapper {
            flex: 1;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .frame-title {
            background-color: #21262d;
            padding: 8px 15px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #58a6ff;
            border-bottom: 1px solid #30363d;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #121212;
        }
    </style>
</head>
<body>

<header>
    정렬 알고리즘 비교 시각화 (Insertion Sort vs Bubble Sort)
    <span>동일한 데이터 배열로 두 정렬 방식의 동작 과정을 비교하세요</span>
</header>

<div class="container">
    <!-- 삽입 정렬 iframe -->
    <div class="frame-wrapper">
        <div class="frame-title">삽입 정렬 (Insertion Sort)</div>
        <iframe src="insertion_sort.html"></iframe>
    </div>

    <!-- 버블 정렬 iframe -->
    <div class="frame-wrapper">
        <div class="frame-title">버블 정렬 (Bubble Sort)</div>
        <iframe src="bubble_sort.html"></iframe>
    </div>
</div>

</body>
</html>
